name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  backend:
    name: Backend CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: be/package-lock.json
      - name: Install dependencies
        working-directory: be
        run: npm ci
      - name: Lint
        working-directory: be
        run: npm run lint
      - name: Test
        working-directory: be
        run: npm run test

  frontend:
    name: Frontend CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: fe/package-lock.json
      - name: Install dependencies
        working-directory: fe
        run: npm ci
      - name: Build
        working-directory: fe
        run: npm run build

  mobile:
    name: Mobile CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mobi/package-lock.json
      - name: Install dependencies
        working-directory: mobi
        run: npm ci
      - name: Lint
        working-directory: mobi
        run: npm run lint
